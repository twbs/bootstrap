<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Engine — Section-Based Theming Demo</title>
  <link rel="stylesheet" href="../dist/css/bootstrap.css">
  <style>
    .color-schema-ocean {
      --bs-primary: #0077b6;
      --bs-primary-rgb: 0, 119, 182;
      --bs-secondary: #457b9d;
      --bs-secondary-rgb: 69, 123, 157;
      --bs-success: #2a9d8f;
      --bs-success-rgb: 42, 157, 143;
      --bs-info: #48cae4;
      --bs-info-rgb: 72, 202, 228;
      --bs-warning: #e9c46a;
      --bs-warning-rgb: 233, 196, 106;
      --bs-danger: #e76f51;
      --bs-danger-rgb: 231, 111, 81;
      --bs-body-bg: #f8f9fa;
      --bs-body-color: #1d3557;
    }

    .color-schema-sunset {
      --bs-primary: #bc4749;
      --bs-primary-rgb: 188, 71, 73;
      --bs-secondary: #6a4c93;
      --bs-secondary-rgb: 106, 76, 147;
      --bs-success: #386641;
      --bs-success-rgb: 56, 102, 65;
      --bs-info: #1982c4;
      --bs-info-rgb: 25, 130, 196;
      --bs-warning: #f4a261;
      --bs-warning-rgb: 244, 162, 97;
      --bs-danger: #9b2226;
      --bs-danger-rgb: 155, 34, 38;
      --bs-body-bg: #fdf6ec;
      --bs-body-color: #2b2d42;
    }

    .color-schema-neon {
      --bs-primary: #06d6a0;
      --bs-primary-rgb: 6, 214, 160;
      --bs-secondary: #118ab2;
      --bs-secondary-rgb: 17, 138, 178;
      --bs-success: #2dc653;
      --bs-success-rgb: 45, 198, 83;
      --bs-info: #7209b7;
      --bs-info-rgb: 114, 9, 183;
      --bs-warning: #fee440;
      --bs-warning-rgb: 254, 228, 64;
      --bs-danger: #ef476f;
      --bs-danger-rgb: 239, 71, 111;
      --bs-body-bg: #0b0c10;
      --bs-body-color: #e0e0e0;
    }

    .schema-section {
      padding: 3rem 0;
      background-color: var(--bs-body-bg);
      color: var(--bs-body-color);
    }
    .schema-section + .schema-section {
      border-top: 4px solid var(--bs-primary);
    }
    .section-header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--bs-border-color);
    }
    .component-group {
      margin-bottom: 2.5rem;
    }
    .component-group h4 {
      margin-bottom: 1rem;
      opacity: .7;
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
  </style>
</head>
<body>

  <section class="schema-section">
    <div class="container">
      <div class="section-header">
        <h2>Default (Vanilla Bootstrap)</h2>
        <p class="text-body-secondary">No <code>.color-schema-*</code> class — uses fallback hex values from <code>:root</code></p>
      </div>
      <div id="components-default"></div>
    </div>
  </section>

  <section class="schema-section color-schema-ocean">
    <div class="container">
      <div class="section-header">
        <h2>Ocean Schema</h2>
        <p class="text-body-secondary">Primary: <code>#0077b6</code> — cool blue-green palette</p>
      </div>
      <div id="components-ocean"></div>
    </div>
  </section>

  <section class="schema-section color-schema-sunset">
    <div class="container">
      <div class="section-header">
        <h2>Sunset Schema</h2>
        <p class="text-body-secondary">Primary: <code>#bc4749</code> — warm earthy palette</p>
      </div>
      <div id="components-sunset"></div>
    </div>
  </section>

  <section class="schema-section color-schema-neon">
    <div class="container">
      <div class="section-header">
        <h2>Neon Schema</h2>
        <p class="text-body-secondary">Primary: <code>#06d6a0</code> — vivid dark palette</p>
      </div>
      <div id="components-neon"></div>
    </div>
  </section>


  <script src="../dist/js/bootstrap.bundle.js"></script>

        <div class="d-flex gap-2">
          <button class="btn btn-secondary" data-bs-toggle="tooltip" data-bs-placement="top" title="Themed tooltip!">
            Hover for Tooltip
          </button>
          <button class="btn btn-primary" data-bs-toggle="popover" data-bs-title="Themed Popover" data-bs-content="Content inherits section theme." data-bs-trigger="focus">
            Click for Popover
          </button>
        </div>
      </div>

      <div class="component-group">
        <h4>Close Button</h4>
        <div class="d-flex gap-3 align-items-center">
          <button type="button" class="btn-close"></button>
          <button type="button" class="btn-close" disabled></button>
          <div class="bg-dark p-2 rounded">
            <button type="button" class="btn-close btn-close-white"></button>
          </div>
        </div>
      </div>

      <div class="component-group">
        <h4>Placeholders</h4>
        <div class="card" style="width: 18rem;">
          <div class="card-body">
            <h5 class="card-title placeholder-glow"><span class="placeholder col-6"></span></h5>
            <p class="card-text placeholder-glow">
              <span class="placeholder col-7"></span>
              <span class="placeholder col-4"></span>
              <span class="placeholder col-6"></span>
            </p>
            <a class="btn btn-primary disabled placeholder col-6"></a>
          </div>
        </div>
      </div>
`;
    }

    ['default', 'ocean', 'sunset', 'neon'].forEach(id => {
      const el = document.getElementById('components-' + id);
      if (el) el.innerHTML = componentHTML(id);
    });

    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
      new bootstrap.Tooltip(el);
    });
    document.querySelectorAll('[data-bs-toggle="popover"]').forEach(el => {
      new bootstrap.Popover(el);
    });
  </script>
</body>
</html>
